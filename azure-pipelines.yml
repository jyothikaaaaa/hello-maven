trigger:
- main

pool:
  vmImage: 'ubuntu-latest' # Use the latest stable image

steps:
- task: Maven@4 # Upgrading to Maven@4 is recommended for newer agents
  inputs:
    mavenPomFile: 'pom.xml'
    mavenOptions: '-Xmx3072m'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.17' # Suggesting 17 as it's the modern LTS, but see note below
    jdkArchitectureOption: 'x64'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    goals: 'package'